{% extends "base.html" %}

{% block title %}Teacher Dashboard | BT Attendance{% endblock %}

{% block content %}
<div class="space-y-8">
    <!-- Stats and Controls -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col justify-between">
            <span class="text-gray-500 text-sm font-medium">Total Students</span>
            <span id="total-students" class="text-4xl font-bold text-gray-800">--</span>
        </div>
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col justify-between border-l-4 border-green-500">
            <span class="text-gray-500 text-sm font-medium">Present</span>
            <span id="present-count" class="text-4xl font-bold text-green-600">--</span>
        </div>
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col justify-between border-l-4 border-red-500">
            <span class="text-gray-500 text-sm font-medium">Absent / Not Seen</span>
            <span id="absent-count" class="text-4xl font-bold text-red-600">--</span>
        </div>
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col justify-center items-center">
            <div id="timer-display" class="hidden text-3xl font-mono font-bold text-primary mb-2">15:00</div>
            <button id="start-btn" onclick="startAttendance()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-xl transition-all flex items-center justify-center space-x-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path></svg>
                <span>Start Attendance</span>
            </button>
            <button id="stop-btn" onclick="stopAttendance()" class="hidden w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-6 rounded-xl transition-all flex items-center justify-center space-x-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 10a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H9a1 1 0 01-1-1v-4z"></path></svg>
                <span>Stop Early</span>
            </button>
        </div>
    </div>

    <!-- Info Banner -->
    <div class="bg-blue-50 border border-blue-200 rounded-xl p-4 flex items-center justify-between">
        <div class="flex items-center space-x-3">
            <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <p class="text-blue-800 font-medium">Student Registration Link: <span class="font-mono bg-blue-100 px-2 py-1 rounded">http://{{ local_ip }}:5000/register</span></p>
        </div>
        <button onclick="copyLink('http://{{ local_ip }}:5000/register')" class="text-blue-600 hover:text-blue-800 text-sm font-bold">Copy Link</button>
    </div>

    <!-- Progress Bar (Visible when running) -->
    <div id="progress-container" class="hidden space-y-2">
        <div class="flex justify-between text-sm font-medium text-gray-600">
            <span>Live Progress</span>
            <span id="progress-percent">0%</span>
        </div>
        <div class="w-full bg-gray-200 rounded-full h-3">
            <div id="progress-bar" class="bg-green-500 h-3 rounded-full transition-all duration-1000" style="width: 0%"></div>
        </div>
    </div>

    <!-- Student Grid -->
    <div class="space-y-4">
        <div class="flex justify-between items-center">
            <h2 class="text-2xl font-bold text-gray-800">Student Attendance List</h2>
            <button onclick="exportExcel()" class="flex items-center space-x-2 text-primary hover:text-blue-800 font-bold bg-white border border-gray-200 px-4 py-2 rounded-lg shadow-sm transition-all">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                <span>Export Excel</span>
            </button>
        </div>
        <div id="student-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
            <!-- Student cards will be injected here -->
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        pollAttendanceStatus();
        setInterval(pollAttendanceStatus, 3000);
    });

    function copyLink(text) {
        navigator.clipboard.writeText(text);
        showToast("Link copied to clipboard!", "success");
    }

    function exportExcel() {
        window.location.href = '/api/export';
    }
</script>
{% endblock %}
