{% extends "base.html" %}

{% block title %}Live Monitor | BT Attendance{% endblock %}

{% block head %}
<style>
    .card-enter {
        animation: slideIn 0.5s cubic-bezier(0.23, 1, 0.32, 1) forwards;
    }
    @keyframes slideIn {
        from { opacity: 0; transform: translateX(-20px) scale(0.95); background-color: #dcfce7; }
        to { opacity: 1; transform: translateX(0) scale(1); background-color: white; }
    }
    .big-counter { font-variant-numeric: tabular-nums; }
</style>
{% endblock %}

{% block content %}
<div class="space-y-8">
    <!-- Header with Clock and Timer -->
    <div class="flex flex-col md:flex-row justify-between items-center bg-primary text-white p-8 rounded-3xl shadow-xl">
        <div class="text-center md:text-left mb-6 md:mb-0">
            <h1 class="text-2xl font-bold opacity-80 uppercase tracking-widest mb-1">Live Attendance Monitor</h1>
            <div id="current-time" class="text-6xl font-black tabular-nums">00:00:00</div>
        </div>
        <div class="flex items-center space-x-12">
            <div class="text-center">
                <span class="block text-blue-200 text-sm font-bold uppercase mb-1">Time Remaining</span>
                <span id="live-timer" class="text-5xl font-mono font-bold">15:00</span>
            </div>
            <div id="live-status-badge" class="bg-blue-900 px-6 py-3 rounded-2xl border border-blue-700 flex items-center space-x-3">
                <div class="w-3 h-3 rounded-full bg-yellow-400 animate-pulse"></div>
                <span class="font-bold tracking-wide">WAITING</span>
            </div>
        </div>
    </div>

    <!-- Big Counters -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="bg-white p-8 rounded-3xl shadow-sm border border-gray-100 text-center">
            <span class="block text-gray-500 font-bold uppercase text-xs tracking-widest mb-2">Present</span>
            <span id="big-present" class="big-counter text-7xl font-black text-green-600">0</span>
        </div>
        <div class="bg-white p-8 rounded-3xl shadow-sm border border-gray-100 text-center">
            <span class="block text-gray-500 font-bold uppercase text-xs tracking-widest mb-2">Pending</span>
            <span id="big-pending" class="big-counter text-7xl font-black text-gray-400">0</span>
        </div>
        <div class="bg-white p-8 rounded-3xl shadow-sm border border-gray-100 text-center">
            <span class="block text-gray-500 font-bold uppercase text-xs tracking-widest mb-2">Absent</span>
            <span id="big-absent" class="big-counter text-7xl font-black text-red-600">0</span>
        </div>
    </div>

    <!-- Animated List -->
    <div class="space-y-4">
        <h2 class="text-2xl font-bold text-gray-800 flex items-center space-x-2">
            <svg class="w-6 h-6 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            <span>Recently Detected</span>
        </h2>
        <div id="live-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
            <!-- New cards fly in here -->
        </div>
    </div>
</div>

<script>
    let knownPresent = new Set();

    function updateClock() {
        const now = new Date();
        document.getElementById('current-time').innerText = now.toLocaleTimeString('en-GB');
    }
    setInterval(updateClock, 1000);
    updateClock();

    async function pollLive() {
        try {
            const r = await fetch('/api/attendance/status');
            const data = await r.json();

            // Update counters
            document.getElementById('big-present').innerText = data.present_count;
            document.getElementById('big-absent').innerText = data.absent_count;
            document.getElementById('big-pending').innerText = data.total_count - data.present_count - data.absent_count;
            
            // Update status badge
            const badge = document.getElementById('live-status-badge');
            if (data.is_running) {
                badge.innerHTML = '<div class="w-3 h-3 rounded-full bg-green-400 animate-pulse"></div><span class="font-bold tracking-wide">SCANNING LIVE</span>';
                document.getElementById('live-timer').innerText = formatTime(data.remaining_seconds);
            } else {
                badge.innerHTML = '<div class="w-3 h-3 rounded-full bg-red-400"></div><span class="font-bold tracking-wide">SESSION CLOSED</span>';
                document.getElementById('live-timer').innerText = "00:00";
            }

            // Detect new arrivals
            const liveList = document.getElementById('live-list');
            data.students.forEach(s => {
                if (s.status === 'PRESENT' && !knownPresent.has(s.roll_no)) {
                    knownPresent.add(s.roll_no);
                    
                    const card = document.createElement('div');
                    card.className = 'bg-white p-6 rounded-2xl border border-green-100 shadow-sm card-enter flex flex-col justify-between';
                    card.innerHTML = `
                        <div>
                            <div class="flex justify-between items-start mb-2">
                                <span class="text-xs font-black text-green-600 bg-green-50 px-2 py-1 rounded uppercase">New Arrival</span>
                                <span class="text-xs font-mono text-gray-400">${s.time}</span>
                            </div>
                            <h3 class="text-lg font-bold text-gray-800">${s.name}</h3>
                            <p class="text-sm font-mono text-gray-500">${s.roll_no}</p>
                        </div>
                    `;
                    liveList.prepend(card);
                    
                    // Keep only last 12 in live view to avoid clutter
                    if (liveList.children.length > 12) {
                        liveList.lastElementChild.remove();
                    }
                }
            });

        } catch (e) { console.error(e); }
    }

    function formatTime(seconds) {
        const m = Math.floor(seconds / 60);
        const s = seconds % 60;
        return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }

    setInterval(pollLive, 3000);
    pollLive();
</script>
{% endblock %}
